# 修仙游戏配置文件

# 世界配置
world:
  name: "修仙世界"
  start_year: 3842
  start_month: 3
  start_day: 7
  cycles_per_day: 12

# 地图配置（二维坐标系）
map:
  name: "黑风岭"
  width: 120
  height: 80
  min_x: -60
  min_y: -40

# 境界配置
realms:
  # 大境界配置
  major:
    qi_refining:
      name: "炼气"
      order: 1
      hp_multiplier: 1.0
      mp_multiplier: 1.0
      abilities: []
    foundation:
      name: "筑基"
      order: 2
      hp_multiplier: 2.0
      mp_multiplier: 2.0
      abilities: ["御剑飞行"]
    golden_core:
      name: "结丹"
      order: 3
      hp_multiplier: 6.0
      mp_multiplier: 6.0
      abilities: ["御剑飞行", "本命法宝"]
    nascent_soul:
      name: "元婴"
      order: 4
      hp_multiplier: 30.0
      mp_multiplier: 30.0
      abilities: ["御剑飞行", "本命法宝", "元婴出窍"]
    spirit_severance:
      name: "化神"
      order: 5
      hp_multiplier: 300.0
      mp_multiplier: 300.0
      abilities: ["御剑飞行", "本命法宝", "元婴出窍", "神识化形", "空间跃迁"]

  # 小境界突破基础成功率 (%)
  minor_breakthrough_rates:
    qi_refining:
      early_to_mid: 50
      mid_to_late: 30
    foundation:
      early_to_mid: 25
      mid_to_late: 20
    golden_core:
      early_to_mid: 15
      mid_to_late: 10
    nascent_soul:
      early_to_mid: 5
      mid_to_late: 1
    spirit_severance:
      early_to_mid: 1
      mid_to_late: 1

  # 大境界突破基础成功率 (%)
  major_breakthrough_rates:
    qi_to_foundation: 20
    foundation_to_golden: 10
    golden_to_nascent: 2
    nascent_to_spirit: 1

  # 突破尝试周期（每 N 个循环尝试一次）
  breakthrough_cycles: 10

  # 战斗感悟加成（每次战斗后增加突破概率 %）
  combat_insight_bonus: 2.0

# 角色基础属性
character:
  base_hp: 50
  base_mp: 30
  base_spirit: 20

  # 灵根修炼速度加成
  spirit_root_bonuses:
    chaos: 2.0
    single: 1.5
    dual: 1.2
    triple: 1.0
    quadruple: 0.8
    five: 0.6

# 战斗配置
combat:
  # 灵力注入加成比例（每点灵力增加的伤害/防御比例）
  spirit_power_bonus_ratio: 0.05

  # 环境属性加成/减成比例
  environment_bonus_ratio: 0.2
  environment_penalty_ratio: 0.2

# AI 配置
ai:
  # API 配置
  api_url: ""
  api_key: ""
  model: ""

  # 重试配置
  max_retries: 3
  retry_delay: 1.0

  # 提示词配置
  max_memory_items: 10
  max_recent_memories: 5

# 探测配置
detection:
  # 神识到探测范围的转换比例
  spirit_to_range_ratio: 1.0

  # 探测力加成
  detection_bonus_ratio: 0.1

# 基础模板（启动时可用于初始化数据库）
templates:
  treasures:
    - name: "玄金剑"
      element: "metal"
      type: "attack"
      spirit_power_cost: 5
      attack_min: 15
      attack_max: 25
      special_effects: ["对木系敌人伤害+30%"]
      description: "精金打造的长剑"
    - name: "玄铁盾"
      element: "earth"
      type: "defense"
      spirit_power_cost: 3
      defense_min: 10
      defense_max: 15
      special_effects: []
      description: "厚重的铁盾"
    - name: "聚灵佩"
      element: null
      type: "support"
      mp_bonus: 20
      special_effects: ["灵力恢复速度+10%"]
      description: "辅助修炼的玉佩"
  techniques:
    - name: "烈阳诀"
      element: "fire"
      max_level: 10
      cultivation_speed_bonus: 0.15
      attack_bonus: 0.1
      skills: ["烈阳一击"]
      description: "火系功法，修炼速度+15%"
    - name: "金锋剑诀"
      element: "metal"
      max_level: 10
      attack_bonus: 0.2
      skills: ["金锋斩"]
      description: "金系剑法，剑类法宝伤害+20%"
